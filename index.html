function WorkstreamSettings({ onChange }) {
  const [list, setList] = useState(WORKSTREAMS);
  const [editingId, setEditingId] = useState(null);
  const [draft, setDraft] = useState({ label: '', color: '#64748b', description: '' });

  const commit = (newList) => {
    setList(newList);
    persistWS(newList);
    if (onChange) onChange();
  };

  const startEdit = (ws) => {
    setEditingId(ws.id);
    setDraft({ label: ws.label, color: ws.color, description: ws.description || '' });
  };

  const saveEdit = () => {
    commit(list.map(w => w.id === editingId ? { ...w, ...draft } : w));
    setEditingId(null);
  };

  const remove = (id) => {
    if (window.confirm('Remove this workstream? Items assigned to it will remain but lose their workstream.')) {
      commit(list.filter(w => w.id !== id));
    }
  };

  const add = () => {
    const id = `ws_${Date.now()}`;
    commit([...list, { id, label: 'New workstream', color: '#64748b', icon: 'Circle', description: '' }]);
    startEdit({ id, label: 'New workstream', color: '#64748b', description: '' });
  };

  return (
    <div style={{ padding: 20 }}>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 12 }}>
        <div style={{ fontSize: 13, fontWeight: 600 }}>Workstreams</div>
        <button className="btn btn-secondary" style={{ padding: '5px 10px', fontSize: 11.5 }} onClick={add}>
          <Icon name="Plus" size={11} />
          <span>Add</span>
        </button>
      </div>
      <div style={{ fontSize: 11.5, color: 'var(--text-2)', marginBottom: 14, lineHeight: 1.55 }}>
        Workstreams are the operational domains items are categorized by. They appear in the sidebar and drive per-domain views.
      </div>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
        {list.map(ws => (
          editingId === ws.id ? (
            <div key={ws.id} style={{ padding: 12, border: '1.5px solid #6366f1', borderRadius: 7, background: '#eef2ff' }}>
              <div style={{ display: 'flex', gap: 8, marginBottom: 8 }}>
                <input value={draft.label} onChange={(e) => setDraft({ ...draft, label: e.target.value })} className="input" placeholder="Label" style={{ flex: 1 }} />
                <input type="color" value={draft.color} onChange={(e) => setDraft({ ...draft, color: e.target.value })} style={{ width: 36, height: 32, border: '1px solid var(--border)', borderRadius: 4, cursor: 'pointer' }} />
              </div>
              <textarea value={draft.description} onChange={(e) => setDraft({ ...draft, description: e.target.value })} className="input" placeholder="Description" style={{ minHeight: 50, marginBottom: 8 }} />
              <div style={{ display: 'flex', gap: 6 }}>
                <button className="btn btn-primary" onClick={saveEdit}>Save</button>
                <button className="btn btn-secondary" onClick={() => setEditingId(null)}>Cancel</button>
              </div>
            </div>
          ) : (
            <div key={ws.id} style={{ padding: '10px 12px', border: '1px solid var(--border)', borderRadius: 7, display: 'flex', alignItems: 'center', gap: 12 }}>
              <span className="dot" style={{ backgroundColor: ws.color, width: 10, height: 10 }} />
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 13, fontWeight: 500 }}>{ws.label}</div>
                {ws.description && <div style={{ fontSize: 10.5, color: 'var(--text-3)', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{ws.description}</div>}
              </div>
              <button className="icon-btn" onClick={() => startEdit(ws)}><Icon name="Pencil" size={12} /></button>
              <button className="icon-btn" onClick={() => remove(ws.id)}><Icon name="Trash2" size={12} /></button>
            </div>

        ))}

function ChatPanel({ items, events, onClose }) {
  const [messages, setMessages] = useState([
    { role: 'assistant', content: "I have full context on every item, event, and relationship in your tracker. Ask me what's at risk, where to focus, bottlenecks, ownership patterns, or anything else about your operational state." }
  ]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const [apiKey] = useState(() => localStorage.getItem(STORAGE_KEY_API) || '');
  const scrollRef = useRef(null);

  useEffect(() => {
    if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
  }, [messages, loading]);

  const suggestions = [
    "What's at risk this week?",
    "Summarize EIR program readiness",
    "Where is ownership over-concentrated?",
    "What should I tackle first?",
  ];

  const buildSystem = () => {
    const today = new Date().toISOString().slice(0, 10);
    const itemsCtx = items.map(i => ({
      id: i.id,
      title: i.title,
      parent_id: i.parent_id,
      workstream: get(i.workstream, WORKSTREAMS)?.label,
      owner: get(i.owner, PEOPLE)?.name,
      vendor: i.vendor || null,
      deadline: i.deadline,
      days_until: daysBetween(i.deadline),
      status: get(i.status, STATUSES)?.label,
      priority: get(i.priority, PRIORITIES)?.label,
      resource_needed: get(i.resource, RESOURCE_TYPES)?.label,
      effort_estimate: get(i.timeframe, TIMEFRAMES)?.label,
      criticality_score: criticalityScore(i),
      risk_level: riskLevel(i),
      notes: i.notes,
      links_count: (i.links || []).length,
      tags: i.tags || [],
    }));
    const recentEvents = events.slice(0, 15).map(e => ({
      item: items.find(i => i.id === e.item_id)?.title,
      actor: get(e.actor, PEOPLE)?.name,
      event: e.event_type,
      from: e.from, to: e.to,
      when: new Date(e.timestamp).toISOString().slice(0, 10),
    }));

    return `You are an operations assistant embedded in BlueDot Impact's Ops Operations Center. BlueDot is a nonprofit building the AI safety and biosecurity workforce. They are 8 people growing to 25+ in 12 months, with an EIR program launching mid-2026. The user is the Head of Operations.

Today: ${today}
People: ${PEOPLE.map(p => `${p.name} (${p.role})`).join(', ')}

Full tracker state (${items.length} items):
${JSON.stringify(itemsCtx, null, 2)}

Recent events (${recentEvents.length}):
${JSON.stringify(recentEvents, null, 2)}

When answering:
- Be direct and specific. Reference actual items by title.
- Prioritize by criticality_score and risk_level.
- Surface patterns (ownership bottlenecks, workstream concentration, dependencies).
- Keep answers tight. Short paragraphs or compact bullets.
- Plain formatting. No em-dashes. No markdown headers.
- If the tracker can't answer, say so briefly.`;
  };

  const send = async (text) => {
    const q = (text ?? input).trim();
    if (!q || loading) return;
    if (!apiKey) {
      setMessages(prev => [...prev, { role: 'user', content: q }, { role: 'assistant', content: "No API key set. Click Settings in the sidebar to add your Anthropic API key and enable this feature." }]);
      setInput('');
      return;
    }

    const newMessages = [...messages, { role: 'user', content: q }];
    setMessages(newMessages);
    setInput('');
    setLoading(true);

    try {
      const convo = newMessages.map(m => ({ role: m.role, content: m.content }));
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true',
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 1200,
          system: buildSystem(),
          messages: convo,
        }),
      });

      const data = await res.json();
      if (data.error) {
        setMessages([...newMessages, { role: 'assistant', content: `API error: ${data.error.message || 'unknown'}. Check your key in Settings.` }]);
      } else {
        const reply = data.content?.filter(b => b.type === 'text').map(b => b.text).join('\n') || 'No response.';
        setMessages([...newMessages, { role: 'assistant', content: reply }]);
      }
    } catch (e) {
      setMessages([...newMessages, { role: 'assistant', content: `Network error: ${e.message}. Check your connection.` }]);
    } finally {
      setLoading(false);
    }
  };

  return (
    <div className="modal-overlay" onClick={onClose} style={{ position: 'fixed', inset: 0, background: 'rgba(15,23,42,0.4)', display: 'flex', justifyContent: 'flex-end', zIndex: 100 }}>
      <div onClick={(e) => e.stopPropagation()} style={{ background: '#fff', width: '100%', maxWidth: 480, display: 'flex', flexDirection: 'column', boxShadow: '-20px 0 60px rgba(0,0,0,0.15)' }}>
        <div style={{ padding: '14px 18px', borderBottom: '1px solid var(--border)', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
            <div style={{ width: 28, height: 28, borderRadius: 7, background: 'linear-gradient(135deg, #6366f1, #8b5cf6)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              <Icon name="Sparkles" size={14} color="#fff" />
            </div>
            <div>
              <div style={{ fontSize: 13, fontWeight: 600 }}>Ask the tracker</div>
              <div style={{ fontSize: 11, color: 'var(--text-3)' }}>Grounded in {items.length} items, {events.length} events</div>
            </div>
          </div>
          <button onClick={onClose} className="icon-btn"><Icon name="X" size={15} /></button>
        </div>

        <div ref={scrollRef} style={{ flex: 1, overflow: 'auto', padding: 18, display: 'flex', flexDirection: 'column', gap: 10 }}>
          {messages.map((m, i) => (
            <div key={i} style={{ display: 'flex', justifyContent: m.role === 'user' ? 'flex-end' : 'flex-start' }}>
              <div style={{ maxWidth: '86%', padding: '10px 13px', borderRadius: 10, fontSize: 13, whiteSpace: 'pre-wrap', lineHeight: 1.55, background: m.role === 'user' ? '#0f172a' : '#f8fafc', color: m.role === 'user' ? '#fff' : 'var(--text)', border: m.role === 'user' ? 'none' : '1px solid var(--border)' }}>
                {m.content}
              </div>
            </div>
          ))}
          {loading && (
            <div style={{ display: 'flex' }}>
              <div style={{ display: 'flex', gap: 4, padding: '12px 14px', background: '#f8fafc', border: '1px solid var(--border)', borderRadius: 10 }}>
                <span style={{ width: 6, height: 6, borderRadius: '50%', background: '#94a3b8', animation: 'pulse 1.2s infinite' }} />
                <span style={{ width: 6, height: 6, borderRadius: '50%', background: '#94a3b8', animation: 'pulse 1.2s infinite', animationDelay: '0.15s' }} />
                <span style={{ width: 6, height: 6, borderRadius: '50%', background: '#94a3b8', animation: 'pulse 1.2s infinite', animationDelay: '0.3s' }} />
              </div>
            </div>
          )}
        </div>

        {messages.length === 1 && (
          <div style={{ padding: '0 18px 10px', display: 'flex', flexWrap: 'wrap', gap: 6 }}>
            {suggestions.map(s => (
              <button key={s} onClick={() => send(s)} style={{ padding: '6px 10px', background: '#f8fafc', border: '1px solid var(--border)', borderRadius: 14, fontSize: 11.5, color: 'var(--text-2)' }} className="row-hover">{s}</button>
            ))}
          </div>
        )}

        <div style={{ padding: '12px 18px 18px', borderTop: '1px solid var(--border)', display: 'flex', gap: 8 }}>
          <input
            type="text" value={input}
            onChange={(e) => setInput(e.target.value)}
            onKeyDown={(e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } }}
            placeholder={apiKey ? "Ask anything about your ops state..." : "Add API key in Settings to enable..."}
            className="input" style={{ fontSize: 13 }}
            disabled={loading}
          />
          <button onClick={() => send()} disabled={!input.trim() || loading} style={{ width: 36, height: 36, border: 'none', borderRadius: 8, background: '#0f172a', color: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center', opacity: input.trim() && !loading ? 1 : 0.4, cursor: input.trim() && !loading ? 'pointer' : 'not-allowed' }}>
            <Icon name="Send" size={13} color="#fff" />
          </button>
        </div>
      </div>
    </div>
  );
}

// ============================================================
// RENDER
// ============================================================

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>

<script>
(function() {
  const PASSWORD = 'bluedot';
  const STORAGE_KEY = 'bluedot_gate_unlocked_v1';
  const gate = document.getElementById('gate');
  const form = document.getElementById('gateForm');
  const input = document.getElementById('gatePass');
  const err = document.getElementById('gateError');

  // If previously unlocked this session, skip the gate
  if (sessionStorage.getItem(STORAGE_KEY) === '1') {
    gate.remove();
    return;
  }

  form.addEventListener('submit', function(e) {
    e.preventDefault();
    if (input.value.trim().toLowerCase() === PASSWORD) {
      try { sessionStorage.setItem(STORAGE_KEY, '1'); } catch(e) {}
      gate.style.transition = 'opacity 0.2s';
      gate.style.opacity = '0';
      setTimeout(() => gate.remove(), 200);
    } else {
      err.textContent = 'Incorrect password. Try again.';
      input.value = '';
      input.focus();
    }
  });
})();
</script>

const Icon = ({ name, size = 14, color, strokeWidth = 2, style = {} }) => {
  const ref = useRef(null);
  const [ready, setReady] = useState(!!window.lucide);

  useEffect(() => {
    if (!window.lucide) {
      const interval = setInterval(() => {
        if (window.lucide) { setReady(true); clearInterval(interval); }
      }, 50);
      return () => clearInterval(interval);
    }
  }, []);

  useEffect(() => {
    if (ref.current && window.lucide && window.lucide.icons) {
      ref.current.innerHTML = '';
      const iconNode = window.lucide.icons[name];
      if (!iconNode) return;
      try {
        const icon = window.lucide.createElement(iconNode);
        icon.setAttribute('width', size);
        icon.setAttribute('height', size);
        icon.setAttribute('stroke-width', strokeWidth);
        if (color) icon.setAttribute('stroke', color);
        ref.current.appendChild(icon);
      } catch (e) {}
    }
  }, [name, size, color, strokeWidth, ready]);
  return <span ref={ref} style={{ display: 'inline-flex', alignItems: 'center', width: size, height: size, ...style }} />;
};

function daysFromNow(n) {
  const d = new Date();
  d.setDate(d.getDate() + n);
  return d.toISOString().slice(0, 10);
}

function daysBetween(dateStr) {
  const target = new Date(dateStr);
  const now = new Date();
  now.setHours(0, 0, 0, 0);
  target.setHours(0, 0, 0, 0);
  return Math.round((target - now) / (1000 * 60 * 60 * 24));
}

function riskLevel(item) {
  if (item.status === 'done') return 'done';
  if (item.status === 'blocked') return 'blocked';
  const days = daysBetween(item.deadline);
  if (days < 0) return 'overdue';
  if (days <= 7) return 'critical';
  if (days <= 21) return 'warning';
  return 'ok';
}

function formatDeadline(dateStr) {
  const days = daysBetween(dateStr);
  if (days < 0) return `${Math.abs(days)}d late`;
  if (days === 0) return 'Today';
  if (days === 1) return 'Tomorrow';
  if (days <= 30) return `${days}d`;
  const weeks = Math.round(days / 7);
  if (weeks <= 12) return `${weeks}w`;
  const months = Math.round(days / 30);
  return `${months}mo`;
}

function formatDateShort(dateStr) {
  const d = new Date(dateStr);
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function get(id, list) { return list.find(x => x.id === id); }

// Criticality score (1-10). Transparent formula:
// base = priority weight (p0=8, p1=6, p2=4, p3=2)
// + urgency modifier (overdue +3, <=7d +2, <=21d +1)
// + stall modifier (blocked +1)
// - done penalty (done = 0)
// Manual override via item.criticality_override wins.
function criticalityScore(item) {
  if (item.status === 'done') return 0;
  if (typeof item.criticality_override === 'number') return Math.max(1, Math.min(10, item.criticality_override));
  const prio = get(item.priority, PRIORITIES);
  let score = prio?.weight || 2;
  const days = daysBetween(item.deadline);
  if (days < 0) score += 3;
  else if (days <= 7) score += 2;
  else if (days <= 21) score += 1;
  if (item.status === 'blocked') score += 1;
  return Math.min(10, Math.max(1, score));
}

function criticalityBreakdown(item) {
  if (item.status === 'done') return { total: 0, parts: [{ label: 'Done', value: 0 }] };
  const prio = get(item.priority, PRIORITIES);
  const parts = [];
  parts.push({ label: `Priority ${prio?.label}`, value: prio?.weight || 2 });
  const days = daysBetween(item.deadline);
  if (days < 0) parts.push({ label: 'Overdue', value: 3 });
  else if (days <= 7) parts.push({ label: 'Due ≤7d', value: 2 });
  else if (days <= 21) parts.push({ label: 'Due ≤21d', value: 1 });
  if (item.status === 'blocked') parts.push({ label: 'Blocked', value: 1 });
  const total = Math.min(10, parts.reduce((s, p) => s + p.value, 0));
  return { total, parts };
}

// ============================================================
// STORAGE
// ============================================================

const STORAGE_KEY_ITEMS = 'bluedot_ops_items_v3';
const STORAGE_KEY_EVENTS = 'bluedot_ops_events_v3';
const STORAGE_KEY_API = 'bluedot_ops_api_key';

function loadFromStorage(key, fallback) {
  try {
    const raw = localStorage.getItem(key);
    if (raw) return JSON.parse(raw);
  } catch (e) {}
  return fallback;
}

function saveToStorage(key, value) {
  try { localStorage.setItem(key, JSON.stringify(value)); } catch (e) {}
}

// ============================================================
// MAIN APP
// ============================================================

function App() {
  const [items, setItems] = useState(() => loadFromStorage(STORAGE_KEY_ITEMS, SEED_ITEMS));
  const [events, setEvents] = useState(() => loadFromStorage(STORAGE_KEY_EVENTS, SEED_EVENTS));
  const [view, setView] = useState('overview'); // overview | all | ws_<id> | people | data | settings
  const [selectedItem, setSelectedItem] = useState(null);
  const [addOpen, setAddOpen] = useState(false);
  const [addParentId, setAddParentId] = useState(null);
  const [chatOpen, setChatOpen] = useState(false);
  const [settingsOpen, setSettingsOpen] = useState(false);
  const [refreshKey, setRefreshKey] = useState(0);

  const bumpRefresh = () => setRefreshKey(k => k + 1);

  useEffect(() => { saveToStorage(STORAGE_KEY_ITEMS, items); }, [items]);
  useEffect(() => { saveToStorage(STORAGE_KEY_EVENTS, events); }, [events]);

  const logEvent = (item_id, event_type, from, to, actor = 'head_ops') => {
    const ev = { id: `e_${Date.now()}_${Math.random().toString(36).slice(2, 6)}`, item_id, timestamp: Date.now(), actor, event_type, from, to };
    setEvents(prev => [ev, ...prev]);
  };

  const updateItem = (id, updates) => {
    setItems(prev => prev.map(item => {
      if (item.id !== id) return item;
      Object.keys(updates).forEach(key => {
        if (item[key] !== updates[key]) {
          const event_type = key === 'status' ? 'status_changed' : key === 'owner' ? 'owner_changed' : key === 'deadline' ? 'deadline_changed' : 'updated';
          logEvent(id, event_type, item[key], updates[key]);
        }
      });
      return { ...item, ...updates };
    }));
    if (selectedItem && selectedItem.id === id) setSelectedItem(prev => ({ ...prev, ...updates }));
  };

  const deleteItem = (id) => {
    const descendants = items.filter(i => i.parent_id === id).map(i => i.id);
    const toDelete = new Set([id, ...descendants]);
    setItems(prev => prev.filter(i => !toDelete.has(i.id)));
    logEvent(id, 'deleted', null, 'Item deleted');
    if (selectedItem && selectedItem.id === id) setSelectedItem(null);
  };

  const addItem = (itemData) => {
    const newItem = {
      ...itemData,
      id: `i_${Date.now()}_${Math.random().toString(36).slice(2, 6)}`,
      created_at: Date.now(),
      links: itemData.links || [],
      tags: itemData.tags || [],
    };
    setItems(prev => [newItem, ...prev]);
    logEvent(newItem.id, 'created', null, 'Item created');
  };

  const addItemsBulk = (itemsData) => {
    const now = Date.now();
    const newItems = itemsData.map((d, idx) => ({
      ...d,
      id: `i_${now}_${idx}_${Math.random().toString(36).slice(2, 6)}`,
      created_at: now,
      links: d.links || [],
      tags: d.tags || [],
    }));
    setItems(prev => [...newItems, ...prev]);
    newItems.forEach(i => logEvent(i.id, 'created', null, 'Item created via intake'));
  };

  return (
    <div style={{ display: 'flex', height: '100vh', overflow: 'hidden' }}>
      <Sidebar
        view={view}
        setView={setView}
        items={items}
        onOpenSettings={() => setSettingsOpen(true)}
      />
      <main style={{ flex: 1, overflow: 'auto', background: 'var(--bg)' }}>
        <TopBar
          view={view}
          onAsk={() => setChatOpen(true)}
          onAdd={() => { setAddParentId(null); setAddOpen(true); }}
        />
        <div style={{ padding: '0 24px 40px' }}>
          {view === 'overview' && (
            <OverviewPage items={items} events={events} onItemClick={setSelectedItem} onNav={setView} />
          )}
          {view === 'insights' && (
            <InsightsPage items={items} events={events} onItemClick={setSelectedItem} />
          )}
          {view === 'all' && (
            <AllItemsPage items={items} onItemClick={setSelectedItem} onAddSubtask={(parentId) => { setAddParentId(parentId); setAddOpen(true); }} updateItem={updateItem} />
          )}
          {view.startsWith('ws_') && (
            <WorkstreamPage
              workstreamId={view.slice(3)}
              items={items}
              events={events}
              onItemClick={setSelectedItem}
              onAddSubtask={(parentId) => { setAddParentId(parentId); setAddOpen(true); }}
              updateItem={updateItem}
            />
          )}
          {view === 'people' && (
            <PeoplePage items={items} events={events} onItemClick={setSelectedItem} />
          )}
          {view === 'data' && (
            <ToolsAndIntakePage items={items} onAddItems={addItemsBulk} />
          )}
        </div>
      </main>

      {selectedItem && (
        <ItemDetailModal
          item={selectedItem}
          allItems={items}
          events={events}
          onClose={() => setSelectedItem(null)}
          onUpdate={(updates) => updateItem(selectedItem.id, updates)}
          onDelete={() => deleteItem(selectedItem.id)}
          onOpenItem={(it) => setSelectedItem(it)}
          onAddSubtask={() => { setAddParentId(selectedItem.id); setAddOpen(true); }}
        />
      )}

      {addOpen && (
        <AddItemModal
          parentId={addParentId}
          allItems={items}
          onClose={() => setAddOpen(false)}
          onAdd={(data) => { addItem(data); setAddOpen(false); }}
        />
      )}

      {chatOpen && (
        <ChatPanel items={items} events={events} onClose={() => setChatOpen(false)} />
      )}

      {settingsOpen && (
        <SettingsModal onClose={() => setSettingsOpen(false)} onRefresh={bumpRefresh} />
      )}
    </div>
  );
}

function TopBar({ view, onAsk, onAdd }) {
  const title = useMemo(() => {
    if (view === 'overview') return { main: 'Overview', sub: 'Operational state at a glance' };
    if (view === 'insights') return { main: 'Insights', sub: 'Trends, blockers, and team health over time' };
    if (view === 'all') return { main: 'All items', sub: 'Every tracked item including sub-tasks' };
    if (view === 'people') return { main: 'People', sub: 'Team load and ownership' };
    if (view === 'data') return { main: 'Tools & Intake', sub: 'Launch connected workspaces and create tasks from documents' };
    if (view.startsWith('ws_')) {
      const ws = get(view.slice(3), WORKSTREAMS);
      return { main: ws?.label || 'Workstream', sub: ws?.description || '' };
    }
    return { main: '', sub: '' };
  }, [view]);

  return (
    <div style={{ padding: '20px 24px 16px', display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', gap: 16 }}>
      <div>
        <div style={{ fontSize: 19, fontWeight: 600, letterSpacing: -0.3 }}>{title.main}</div>
        <div style={{ fontSize: 12, color: 'var(--text-2)', marginTop: 2 }}>{title.sub}</div>
      </div>
      <div style={{ display: 'flex', gap: 8 }}>
        <button className="btn btn-secondary" onClick={onAdd}>
          <Icon name="Plus" size={13} />
          <span>New item</span>
        </button>
        <button className="btn btn-primary" onClick={onAsk}>
          <Icon name="Sparkles" size={13} />
          <span>Ask the tracker</span>
          <kbd>⌘K</kbd>
        </button>
      </div>
    </div>
  );
}

function OverviewPage({ items, events, onItemClick, onNav }) {
  const open = items.filter(i => i.status !== 'done');
  const atRisk = open.filter(i => { const r = riskLevel(i); return r === 'overdue' || r === 'critical' || r === 'blocked'; });
  const doneThisWeek = items.filter(i => i.status === 'done' && (Date.now() - (i.created_at || 0)) < 7 * 86400000).length;
  const inProgress = items.filter(i => i.status === 'in_progress').length;

  const focusList = [...open]
    .sort((a, b) => criticalityScore(b) - criticalityScore(a))
    .slice(0, 6);

  return (
    <div>
      {/* HEADLINE STATS */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(5, 1fr)', gap: 10, marginBottom: 14 }}>
        <HeadlineStat label="Open items" value={open.length} sub={`${items.length} total`} />
        <HeadlineStat label="At risk" value={atRisk.length} sub="Overdue, critical, blocked" tone="danger" />
        <HeadlineStat label="In progress" value={inProgress} tone="info" />
        <HeadlineStat label="Blocked" value={items.filter(i => i.status === 'blocked').length} tone="danger" />
        <HeadlineStat label="Done / 7d" value={doneThisWeek} tone="success" />
      </div>

      {/* TOP ROW: Focus + Calendar */}
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 14, marginBottom: 14 }}>
        <FocusPanel items={focusList} onItemClick={onItemClick} />
        <CalendarPanel items={open} onItemClick={onItemClick} />
      </div>

      {/* MIDDLE ROW: At risk + Workstream health */}
      <div style={{ display: 'grid', gridTemplateColumns: '1.3fr 1fr', gap: 14, marginBottom: 14 }}>
        <AtRiskPanel items={atRisk} onItemClick={onItemClick} />
        <WorkstreamHealthPanel items={items} onNav={onNav} />
      </div>

      {/* BOTTOM ROW: Ownership + Recent activity */}
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1.3fr', gap: 14 }}>
        <OwnershipPanel items={items} />
        <ActivityPanel events={events.slice(0, 8)} items={items} onItemClick={onItemClick} />
      </div>
    </div>
  );
}

function HeadlineStat({ label, value, sub, tone = 'neutral' }) {
  const tones = {
    neutral: { color: 'var(--text)', bg: 'var(--panel)' },
    danger: { color: 'var(--danger)', bg: '#fef2f2' },
    info: { color: 'var(--info)', bg: '#eff6ff' },
    success: { color: 'var(--ok)', bg: '#ecfdf5' },
  };
  const t = tones[tone];
  return (
    <div className="card" style={{ padding: '12px 14px' }}>
      <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', marginBottom: 6 }}>
        <div style={{ fontSize: 11, color: 'var(--text-2)', fontWeight: 500 }}>{label}</div>
      </div>
      <div style={{ fontSize: 26, fontWeight: 600, letterSpacing: -0.5, color: t.color, lineHeight: 1 }}>{value}</div>
      {sub && <div style={{ fontSize: 10, color: 'var(--text-3)', marginTop: 4 }}>{sub}</div>}
    </div>
  );
}

// Focus panel: where to dedicate resources next
function FocusPanel({ items, onItemClick }) {
  return (
    <div className="card" style={{ padding: 14 }}>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 10 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
          <Icon name="Target" size={14} color="var(--violet)" />
          <div style={{ fontSize: 12, fontWeight: 600 }}>Where to dedicate resources next</div>
        </div>
        <div style={{ fontSize: 10, color: 'var(--text-3)' }}>Ranked by criticality</div>
      </div>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
        {items.length === 0 && <div style={{ padding: 20, textAlign: 'center', color: 'var(--text-3)', fontSize: 12 }}>All clear.</div>}
        {items.map((item, idx) => {
          const score = criticalityScore(item);
          const ws = get(item.workstream, WORKSTREAMS);
          const resource = get(item.resource, RESOURCE_TYPES);
          const tf = get(item.timeframe, TIMEFRAMES);
          const risk = riskLevel(item);
          const riskColors = { overdue: '#dc2626', critical: '#ea580c', blocked: '#dc2626', warning: '#ca8a04', ok: '#64748b' };
          return (
            <div
              key={item.id}
              className="row-hover"
              onClick={() => onItemClick(item)}
              style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '8px 8px', borderRadius: 6, cursor: 'pointer', border: '1px solid var(--border)' }}
            >
              <div style={{ width: 28, height: 28, borderRadius: 6, display: 'flex', alignItems: 'center', justifyContent: 'center', background: '#f1f5f9', fontSize: 12, fontWeight: 700, color: 'var(--text)' }}>{idx + 1}</div>
              <ScoreBadge score={score} />
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 12, fontWeight: 500, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{item.title}</div>
                <div style={{ display: 'flex', gap: 8, alignItems: 'center', marginTop: 2 }}>
                  <span style={{ fontSize: 10, color: ws.color, display: 'flex', alignItems: 'center', gap: 3 }}>
                    <span className="dot" style={{ backgroundColor: ws.color }} />{ws.label}
                  </span>
                  {resource && <span style={{ fontSize: 10, color: 'var(--text-2)' }}>• {resource.label}</span>}
                  {tf && <span style={{ fontSize: 10, color: 'var(--text-2)' }}>• ~{tf.label}</span>}
                </div>
              </div>
              <div style={{ fontSize: 11, fontWeight: 600, color: riskColors[risk], minWidth: 52, textAlign: 'right' }} className="mono">
                {formatDeadline(item.deadline)}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function ScoreBadge({ score }) {
  const color = score >= 9 ? '#dc2626' : score >= 7 ? '#ea580c' : score >= 5 ? '#ca8a04' : '#64748b';
  const bg = score >= 9 ? '#fef2f2' : score >= 7 ? '#fff7ed' : score >= 5 ? '#fefce8' : '#f1f5f9';
  return (
    <div title={`Criticality score: ${score}/10`} style={{ width: 32, height: 24, borderRadius: 5, background: bg, color, fontSize: 12, fontWeight: 700, display: 'flex', alignItems: 'center', justifyContent: 'center', border: `1px solid ${color}22` }} className="mono">
      {score}

  );
}

function CalendarPanel({ items, onItemClick }) {
  const today = new Date();
  today.setHours(0,0,0,0);
  const days = Array.from({ length: 28 }, (_, i) => {
    const d = new Date(today);
    d.setDate(d.getDate() + i);
    return d;
  });

  const itemsByDate = {};
  items.forEach(item => {
    const key = item.deadline;
    if (!itemsByDate[key]) itemsByDate[key] = [];
    itemsByDate[key].push(item);
  });

  return (
    <div className="card" style={{ padding: 14 }}>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 10 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>

        <div style={{ fontSize: 10, color: 'var(--text-3)' }}>Deadline density</div>
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: 3, marginBottom: 8 }}>

        {/* Pad start to align weekday */}
        {Array.from({ length: today.getDay() }, (_, i) => <div key={`pad_${i}`} />)}
        {days.map((d, i) => {
          const key = d.toISOString().slice(0, 10);
          const dayItems = itemsByDate[key] || [];
          const isToday = i === 0;
          const maxCrit = dayItems.reduce((m, it) => Math.max(m, criticalityScore(it)), 0);
          const bgIntensity = maxCrit >= 9 ? '#dc2626' : maxCrit >= 7 ? '#ea580c' : maxCrit >= 5 ? '#ca8a04' : maxCrit > 0 ? '#94a3b8' : 'transparent';
          const hasItems = dayItems.length > 0;

      <div style={{ display: 'flex', gap: 8, marginTop: 12, fontSize: 10, color: 'var(--text-2)', alignItems: 'center' }}>
        <span style={{ display: 'flex', alignItems: 'center', gap: 4 }}><span className="dot" style={{ backgroundColor: '#dc2626', width: 8, height: 8 }} />Critical</span>

function WorkstreamHealthPanel({ items, onNav }) {

function ActivityPanel({ events, items, onItemClick }) {
  const getItem = (id) => items.find(i => i.id === id);
  const eventLabel = (e) => {
    if (e.event_type === 'created') return 'created';
    if (e.event_type === 'status_changed') return `moved ${get(e.from, STATUSES)?.label || e.from} → ${get(e.to, STATUSES)?.label || e.to}`;
    if (e.event_type === 'owner_changed') return `reassigned to ${get(e.to, PEOPLE)?.name || e.to}`;
    if (e.event_type === 'deadline_changed') return `deadline changed to ${e.to}`;
    if (e.event_type === 'deleted') return 'deleted';
    if (e.event_type === 'note_added') return e.to;
    return e.event_type;
  };
  const timeAgo = (ts) => {
    const diff = Date.now() - ts;
    const mins = Math.round(diff / 60000);
    if (mins < 60) return `${mins}m`;
    const hrs = Math.round(mins / 60);
    if (hrs < 24) return `${hrs}h`;
    const days = Math.round(hrs / 24);
    return `${days}d`;
  };
  return (
    <div className="card" style={{ padding: 14 }}>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 10 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
          <Icon name="Activity" size={14} color="var(--info)" />
          <div style={{ fontSize: 12, fontWeight: 600 }}>Recent activity</div>
        </div>
        <div style={{ fontSize: 10, color: 'var(--text-3)' }}>Event log</div>
      </div>
      {events.length === 0 && <div style={{ padding: 20, textAlign: 'center', color: 'var(--text-3)', fontSize: 12 }}>No events yet.</div>}
      <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
        {events.map(e => {
          const item = getItem(e.item_id);
          const actor = get(e.actor, PEOPLE);
          return (
            <div key={e.id} style={{ display: 'flex', alignItems: 'flex-start', gap: 10, padding: '4px 0', fontSize: 12 }}>
              <div style={{ width: 20, height: 20, borderRadius: '50%', background: '#eef2ff', color: '#3730a3', fontSize: 9, fontWeight: 600, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, marginTop: 1 }}>
                {actor ? actor.name.split(' ').map(n => n[0]).join('').slice(0, 2).toUpperCase() : '?'}
              </div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 11.5, color: 'var(--text-2)' }}>
                  <span style={{ fontWeight: 600, color: 'var(--text)' }}>{actor?.name || e.actor}</span>{' '}
                  <span>{eventLabel(e)}</span>
                </div>
                {item && (
                  <div
                    onClick={() => onItemClick(item)}
                    style={{ fontSize: 11, color: 'var(--text)', fontWeight: 500, cursor: 'pointer', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}
                    className="row-hover"
                  >
                    {item.title}
                  </div>
                )}
              </div>
              <div style={{ fontSize: 10, color: 'var(--text-3)' }} className="mono">{timeAgo(e.timestamp)}</div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function InsightsPage({ items, events, onItemClick }) {
  const blockedItems = items.filter(i => i.status === 'blocked');
  const doneItems = items.filter(i => i.status === 'done');

  // Last 8 weeks buckets
  const weekBuckets = useMemo(() => {
    const now = new Date();
    now.setHours(0, 0, 0, 0);
    const dayOfWeek = now.getDay();
    const sunday = new Date(now);
    sunday.setDate(now.getDate() - dayOfWeek);
    const buckets = [];
    for (let i = 7; i >= 0; i--) {
      const start = new Date(sunday);
      start.setDate(sunday.getDate() - i * 7);
      const end = new Date(start);
      end.setDate(start.getDate() + 7);
      buckets.push({ start: start.getTime(), end: end.getTime(), label: start.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) });
    }
    return buckets;
  }, [events.length, items.length]);

  // Velocity: items completed per week
  const completedPerWeek = weekBuckets.map(b => {
    const count = events.filter(e =>
      e.event_type === 'status_changed' &&
      e.to === 'done' &&
      e.timestamp >= b.start &&
      e.timestamp < b.end
    ).length;
    return { ...b, count };
  });

  // Created per week
  const createdPerWeek = weekBuckets.map(b => {
    const count = events.filter(e =>
      e.event_type === 'created' &&
      e.timestamp >= b.start &&
      e.timestamp < b.end
    ).length;
    return { ...b, count };
  });

  // Blocker patterns — what resource types are currently blocking?
  const blockerPatterns = useMemo(() => {
    const counts = {};
    blockedItems.forEach(i => {
      const key = i.resource || 'unspecified';
      counts[key] = (counts[key] || 0) + 1;
    });
    return Object.entries(counts)
      .map(([id, count]) => ({ resource: get(id, RESOURCE_TYPES) || { id, label: 'Unspecified', icon: 'HelpCircle' }, count }))
      .sort((a, b) => b.count - a.count);
  }, [items]);

  // Deadline slip — items where deadline has been changed
  const deadlineSlips = useMemo(() => {
    const byItem = {};
    events.forEach(e => {
      if (e.event_type === 'deadline_changed') {
        if (!byItem[e.item_id]) byItem[e.item_id] = { count: 0, totalDays: 0, events: [] };
        byItem[e.item_id].count += 1;
        byItem[e.item_id].events.push(e);
        try {
          const from = new Date(e.from);
          const to = new Date(e.to);
          const days = Math.round((to - from) / 86400000);
          byItem[e.item_id].totalDays += days;
        } catch (err) {}
      }
    });
    return Object.entries(byItem)
      .map(([itemId, data]) => ({ item: items.find(i => i.id === itemId), ...data }))
      .filter(r => r.item)
      .sort((a, b) => b.count - a.count)
      .slice(0, 6);
  }, [events, items]);

  // Ownership concentration — who owns what % of P0/P1 items?
  const ownershipBreakdown = useMemo(() => {
    const critical = items.filter(i => (i.priority === 'p0' || i.priority === 'p1') && i.status !== 'done');
    const byOwner = {};
    critical.forEach(i => {
      byOwner[i.owner] = (byOwner[i.owner] || 0) + 1;
    });
    const total = critical.length || 1;
    return PEOPLE.map(p => ({
      person: p,
      count: byOwner[p.id] || 0,
      pct: Math.round(((byOwner[p.id] || 0) / total) * 100),
    })).sort((a, b) => b.count - a.count);
  }, [items]);

  // Max values for scaling bars
  const maxCompleted = Math.max(1, ...completedPerWeek.map(w => w.count));
  const maxCreated = Math.max(1, ...createdPerWeek.map(w => w.count), ...completedPerWeek.map(w => w.count));
  const maxBlocker = Math.max(1, ...blockerPatterns.map(b => b.count));

  // Time currently blocked
  const blockedWithDuration = blockedItems.map(item => {
    const blockEvent = events.find(e => e.item_id === item.id && e.event_type === 'status_changed' && e.to === 'blocked');
    const blockedAt = blockEvent ? blockEvent.timestamp : (item.created_at || Date.now());
    const days = Math.floor((Date.now() - blockedAt) / 86400000);
    return { ...item, blockedDays: days };
  }).sort((a, b) => b.blockedDays - a.blockedDays);

  return (
    <div>
      {/* Headline insight */}
      <div className="card" style={{ padding: 18, marginBottom: 14, background: blockedItems.length > 0 ? 'linear-gradient(135deg, #fff 0%, #fef2f2 100%)' : '#fff', borderLeft: blockedItems.length > 0 ? '3px solid #dc2626' : '3px solid #10b981' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 4 }}>
          <Icon name={blockedItems.length > 0 ? 'AlertTriangle' : 'CheckCircle2'} size={15} color={blockedItems.length > 0 ? '#dc2626' : '#10b981'} />
          <div style={{ fontSize: 13, fontWeight: 600 }}>
            {blockedItems.length > 0
              ? `${blockedItems.length} item${blockedItems.length !== 1 ? 's' : ''} currently blocked`
              : 'Nothing currently blocked'}
          </div>
        </div>
        <div style={{ fontSize: 12, color: 'var(--text-2)', marginLeft: 25 }}>
          {blockedItems.length > 0
            ? `Oldest blocker has been stuck for ${blockedWithDuration[0]?.blockedDays || 0} days. The most common blocker type is "${blockerPatterns[0]?.resource.label || 'unspecified'}" (${blockerPatterns[0]?.count || 0} items).`
            : 'All open items are moving. Keep an eye on deadlines and owner load.'}
        </div>
      </div>

      {/* Row 1: Current blockers */}
      <SectionHeader title="Current blockers" count={blockedItems.length} />
      <div className="card" style={{ padding: 16, marginBottom: 14 }}>
        {blockedWithDuration.length === 0 ? (
          <div style={{ padding: 20, textAlign: 'center', color: 'var(--text-3)', fontSize: 12 }}>Nothing is blocked right now.</div>
        ) : (
          <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
            {blockedWithDuration.map(item => {
              const ws = get(item.workstream, WORKSTREAMS);
              const owner = get(item.owner, PEOPLE);
              const resource = get(item.resource, RESOURCE_TYPES);
              return (
                <div
                  key={item.id}
                  className="row-hover"
                  onClick={() => onItemClick(item)}
                  style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '10px 12px', borderRadius: 6, cursor: 'pointer', border: '1px solid var(--border)' }}
                >
                  <div style={{ width: 4, height: 28, borderRadius: 2, background: '#dc2626' }} />
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontSize: 13, fontWeight: 500, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', marginBottom: 2 }}>{item.title}</div>
                    <div style={{ display: 'flex', gap: 10, alignItems: 'center', fontSize: 11, color: 'var(--text-2)' }}>
                      <span style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
                        <span className="dot" style={{ backgroundColor: ws.color }} />{ws.label}
                      </span>
                      <span>•</span>
                      <span>{owner?.name || item.owner}</span>
                      {resource && <><span>•</span>
                        <span style={{ display: 'flex', alignItems: 'center', gap: 3 }}>
                          <Icon name={resource.icon} size={10} />Waiting on {resource.label.toLowerCase()}
                        </span>
                      </>}
                    </div>
                  </div>
                  <div style={{ textAlign: 'right' }}>
                    <div className="mono" style={{ fontSize: 14, fontWeight: 700, color: item.blockedDays > 14 ? '#dc2626' : item.blockedDays > 7 ? '#ea580c' : 'var(--text-2)' }}>{item.blockedDays}d</div>
                    <div style={{ fontSize: 9, color: 'var(--text-3)', textTransform: 'uppercase', letterSpacing: 0.4 }}>blocked</div>
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>

      {/* Row 2: Velocity side by side */}
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 14, marginBottom: 14 }}>

              <span style={{ display: 'flex', alignItems: 'center', gap: 5 }}>
                <span style={{ width: 10, height: 10, background: '#10b981', borderRadius: 2 }} />

              {createdPerWeek.map((w, i) => {

                      <div style={{ flex: 1, height: `${(w.count / maxCreated) * 100}%`, background: '#6366f1', borderRadius: '2px 2px 0 0', minHeight: w.count > 0 ? 4 : 0, opacity: 0.85 }} />
                      <div style={{ flex: 1, height: `${(completed / maxCreated) * 100}%`, background: '#10b981', borderRadius: '2px 2px 0 0', minHeight: completed > 0 ? 4 : 0 }} />
                    </div>
                    <div style={{ fontSize: 9, color: 'var(--text-3)', whiteSpace: 'nowrap' }} className="mono">{w.label}</div>

      {/* Row 3: Blocker patterns + Deadline slip */}
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1.3fr', gap: 14, marginBottom: 14 }}>

                      <span className="mono" style={{ fontSize: 11, fontWeight: 600 }}>{count}</span>

                    <div style={{ height: 6, background: '#f1f5f9', borderRadius: 3, overflow: 'hidden' }}>
                      <div style={{ height: '100%', width: `${(count / maxBlocker) * 100}%`, background: '#dc2626', borderRadius: 3 }} />
                    </div>
                  </div>

        </div>

        <div>
          <SectionHeader title="Deadline slip" />
          <div className="card" style={{ padding: 16 }}>
            <div style={{ fontSize: 11, color: 'var(--text-2)', marginBottom: 12 }}>Items whose deadlines have been pushed</div>
            {deadlineSlips.length === 0 ? (
              <div style={{ padding: 20, textAlign: 'center', color: 'var(--text-3)', fontSize: 12 }}>No deadlines have been changed yet.</div>
            ) : (
              <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
                {deadlineSlips.map(({ item, count, totalDays }) => {
                  const ws = get(item.workstream, WORKSTREAMS);
                  return (
                    <div
                      key={item.id}
                      className="row-hover"
                      onClick={() => onItemClick(item)}
                      style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '7px 8px', borderRadius: 5, cursor: 'pointer', fontSize: 12 }}
                    >

                      <div style={{ flex: 1, minWidth: 0, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', fontWeight: 500 }}>{item.title}</div>
                      <div className="mono" style={{ fontSize: 11, color: 'var(--text-2)', minWidth: 50, textAlign: 'right' }}>{count}× pushed</div>
                      <div className="mono" style={{ fontSize: 11, fontWeight: 600, color: totalDays > 7 ? '#dc2626' : 'var(--text-2)', minWidth: 60, textAlign: 'right' }}>

      {/* Row 4: Ownership concentration */}

          <>
            <div style={{ display: 'flex', height: 32, borderRadius: 6, overflow: 'hidden', marginBottom: 14, border: '1px solid var(--border)' }}>

                const colors = ['#6366f1', '#8b5cf6', '#ec4899', '#f59e0b', '#10b981'];
                return (
                  <div
                    key={o.person.id}
                    title={`${o.person.name}: ${o.count} items (${o.pct}%)`}
                    style={{ width: `${o.pct}%`, background: colors[i % colors.length], display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#fff', fontSize: 11, fontWeight: 600, minWidth: 20 }}

                );
              })}
            </div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
              {ownershipBreakdown.map((o, i) => {
                const colors = ['#6366f1', '#8b5cf6', '#ec4899', '#f59e0b', '#10b981'];
                const initials = o.person.name.split(' ').map(n => n[0]).join('').slice(0, 2).toUpperCase();

                  <div key={o.person.id} style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                    <div style={{ width: 26, height: 26, borderRadius: '50%', background: o.count > 0 ? colors[i % colors.length] : '#e2e8f0', color: '#fff', fontSize: 10, fontWeight: 600, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>{initials}</div>
                    <div style={{ flex: 1 }}>

                      <div style={{ fontSize: 10.5, color: 'var(--text-3)' }}>{o.person.role}</div>

              <div style={{ marginTop: 14, padding: 10, background: '#fef2f2', border: '1px solid #fecaca', borderRadius: 6, fontSize: 11.5, color: '#991b1b', display: 'flex', gap: 8, alignItems: 'flex-start' }}>
                <Icon name="AlertTriangle" size={13} color="#dc2626" style={{ marginTop: 1 }} />
                <div>
                  <strong>Concentration risk:</strong> {ownershipBreakdown[0].person.name} owns {ownershipBreakdown[0].pct}% of critical items. Consider delegation or hiring to distribute load.
                </div>
              </div>

          </>
        )}

      {/* Data note */}
      <div className="card" style={{ padding: 14, background: '#f8fafc', fontSize: 11, color: 'var(--text-2)', lineHeight: 1.6, display: 'flex', gap: 10, alignItems: 'flex-start' }}>
        <Icon name="Info" size={12} color="var(--text-3)" style={{ marginTop: 2 }} />
        <div>
          Insights are computed from the event log ({events.length} events across {items.length} items). Charts populate as the tracker is used. Over time, trends like velocity slowdowns, recurring blockers, and ownership drift become visible — making it easier to intervene early.
        </div>
      </div>
    </div>
  );
}

// ITEMS TABLE (used in All items + workstream pages)
// ============================================================

function ItemsTable({ items, allItems, onItemClick, onAddSubtask, updateItem, showWorkstreamCol = true, showParent = true }) {
  // Build a tree: top-level items with children grouped
  const topLevel = items.filter(i => !i.parent_id);
  const childrenByParent = {};
  items.forEach(i => {
    if (i.parent_id) {
      if (!childrenByParent[i.parent_id]) childrenByParent[i.parent_id] = [];
      childrenByParent[i.parent_id].push(i);
    }
  });

  // Orphan subtasks (parent not in filtered set but subtask is) — show at top level
  const orphans = items.filter(i => i.parent_id && !items.find(p => p.id === i.parent_id));

  const sortFn = (a, b) => {
    const order = { overdue: 0, critical: 1, blocked: 2, warning: 3, ok: 4, done: 5 };
    const ra = order[riskLevel(a)], rb = order[riskLevel(b)];
    if (ra !== rb) return ra - rb;
    return new Date(a.deadline) - new Date(b.deadline);
  };

  const sortedTop = [...topLevel, ...orphans].sort(sortFn);

  return (
    <div className="card" style={{ overflow: 'hidden' }}>
      <div style={{ display: 'flex', padding: '10px 0', background: 'var(--panel-alt)', borderBottom: '1px solid var(--border)', fontSize: 10, fontWeight: 600, color: 'var(--text-3)', textTransform: 'uppercase', letterSpacing: 0.5 }}>
        <div style={{ flex: '0 0 28px', padding: '0 4px 0 16px' }} />
        <div style={{ flex: '0 0 32px', padding: '0 4px', textAlign: 'center' }}>Crit</div>
        <div style={{ flex: '1 1 auto', padding: '0 10px' }}>Item</div>
        {showWorkstreamCol && <div style={{ flex: '0 0 110px', padding: '0 10px' }}>Workstream</div>}
        <div style={{ flex: '0 0 110px', padding: '0 10px' }}>Owner</div>
        <div style={{ flex: '0 0 120px', padding: '0 10px' }}>Resource</div>
        <div style={{ flex: '0 0 90px', padding: '0 10px' }}>Effort</div>
        <div style={{ flex: '0 0 100px', padding: '0 10px' }}>Status</div>
        <div style={{ flex: '0 0 80px', padding: '0 16px 0 10px', textAlign: 'right' }}>Deadline</div>
      </div>
      {sortedTop.length === 0 && <div style={{ padding: 40, textAlign: 'center', color: 'var(--text-3)', fontSize: 13 }}>No items to show.</div>}
      {sortedTop.map(item => (
        <ItemRowWithChildren
          key={item.id}
          item={item}
          children={(childrenByParent[item.id] || []).sort(sortFn)}
          onItemClick={onItemClick}
          onAddSubtask={onAddSubtask}
          updateItem={updateItem}
          showWorkstreamCol={showWorkstreamCol}
          showParent={showParent}
          allItems={allItems}
        />
      ))}
    </div>
  );
}

function ItemRowWithChildren({ item, children, onItemClick, onAddSubtask, updateItem, showWorkstreamCol, showParent, allItems }) {
  const [expanded, setExpanded] = useState(true);
  const hasChildren = children.length > 0;
  return (
    <>
      <ItemRow
        item={item}
        onItemClick={onItemClick}
        onAddSubtask={onAddSubtask}
        updateItem={updateItem}
        showWorkstreamCol={showWorkstreamCol}
        hasChildren={hasChildren}
        expanded={expanded}
        onToggleExpand={() => setExpanded(!expanded)}
        depth={0}
      />
      {expanded && children.map(child => (
        <ItemRow
          key={child.id}
          item={child}
          onItemClick={onItemClick}
          onAddSubtask={onAddSubtask}
          updateItem={updateItem}
          showWorkstreamCol={showWorkstreamCol}
          hasChildren={false}
          depth={1}
        />
      ))}
    </>
  );
}

function ItemRow({ item, onItemClick, onAddSubtask, updateItem, showWorkstreamCol, hasChildren, expanded, onToggleExpand, depth = 0 }) {
  const ws = get(item.workstream, WORKSTREAMS);
  const status = get(item.status, STATUSES);
  const owner = get(item.owner, PEOPLE);
  const resource = get(item.resource, RESOURCE_TYPES);
  const tf = get(item.timeframe, TIMEFRAMES);
  const risk = riskLevel(item);
  const score = criticalityScore(item);
  const riskColors = { overdue: '#dc2626', critical: '#ea580c', blocked: '#dc2626', warning: '#ca8a04', ok: '#64748b', done: '#10b981' };

  const cycleStatus = (e) => {
    e.stopPropagation();
    const order = ['not_started', 'in_progress', 'blocked', 'done'];
    const next = order[(order.indexOf(item.status) + 1) % order.length];
    updateItem(item.id, { status: next });
  };

  return (
    <div
      className="row-hover"
      onClick={() => onItemClick(item)}
      style={{
        display: 'flex', alignItems: 'center', padding: '9px 0', borderBottom: '1px solid #f1f5f9',
        cursor: 'pointer', fontSize: 12.5, opacity: item.status === 'done' ? 0.55 : 1,
      }}
    >
      <div style={{ flex: '0 0 28px', padding: '0 4px 0 16px', display: 'flex', justifyContent: 'center' }}>
        {hasChildren ? (
          <button onClick={(e) => { e.stopPropagation(); onToggleExpand(); }} className="icon-btn" style={{ padding: 2 }}>
            <Icon name={expanded ? 'ChevronDown' : 'ChevronRight'} size={13} />
          </button>
        ) : depth > 0 ? (
          <div style={{ width: 12, height: 1, background: '#cbd5e1', marginLeft: 8 }} />
        ) : null}
      </div>
      <div style={{ flex: '0 0 32px', padding: '0 4px', display: 'flex', justifyContent: 'center' }}>
        <ScoreBadge score={score} />
      </div>
      <div style={{ flex: '1 1 auto', padding: '0 10px', minWidth: 0, paddingLeft: depth * 20 + 10 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
          <button onClick={cycleStatus} className="icon-btn" style={{ padding: 2 }}>
            {item.status === 'done' ? <Icon name="CheckCircle2" size={14} color="#10b981" /> :
             item.status === 'blocked' ? <Icon name="AlertCircle" size={14} color="#dc2626" /> :
             item.status === 'in_progress' ? <Icon name="Clock" size={14} color="#3b82f6" /> :
             <Icon name="Circle" size={14} color="#cbd5e1" />}
          </button>
          <div style={{ fontWeight: 500, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', textDecoration: item.status === 'done' ? 'line-through' : 'none' }}>
            {item.title}
          </div>
          {item.links && item.links.length > 0 && (
            <span style={{ fontSize: 10, color: 'var(--text-3)', display: 'flex', alignItems: 'center', gap: 3 }}>
              <Icon name="Link2" size={10} />{item.links.length}
            </span>
          )}
        </div>
      </div>
      {showWorkstreamCol && (
        <div style={{ flex: '0 0 110px', padding: '0 10px' }}>
          <span style={{ fontSize: 11, display: 'flex', alignItems: 'center', gap: 5 }}>
            <span className="dot" style={{ backgroundColor: ws.color }} />
            <span style={{ overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{ws.label}</span>
          </span>
        </div>
      )}
      <div style={{ flex: '0 0 110px', padding: '0 10px', fontSize: 11.5, color: 'var(--text-2)', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
        {owner?.name || '—'}
      </div>
      <div style={{ flex: '0 0 120px', padding: '0 10px', fontSize: 11, color: 'var(--text-2)' }}>
        {resource ? (
          <span style={{ display: 'inline-flex', alignItems: 'center', gap: 4 }}>
            <Icon name={resource.icon} size={10} />
            <span>{resource.label}</span>
          </span>
        ) : '—'}
      </div>
      <div style={{ flex: '0 0 90px', padding: '0 10px', fontSize: 11, color: 'var(--text-2)' }} className="mono">
        {tf ? `~${tf.label}` : '—'}
      </div>
      <div style={{ flex: '0 0 100px', padding: '0 10px' }}>
        <span className="chip" style={{ color: status.color, borderColor: `${status.color}44`, backgroundColor: `${status.color}11` }}>
          {status.label}
        </span>
      </div>
      <div style={{ flex: '0 0 80px', padding: '0 16px 0 10px', textAlign: 'right' }}>
        <span className="mono" style={{ fontSize: 11, fontWeight: 600, color: riskColors[risk] }}>
          {item.status === 'done' ? '—' : formatDeadline(item.deadline)}
        </span>
      </div>
    </div>
  );
}

// ============================================================
// ALL ITEMS PAGE
// ============================================================

function AllItemsPage({ items, onItemClick, onAddSubtask, updateItem }) {
  const [fWS, setFWS] = useState('all');
  const [fStatus, setFStatus] = useState('all_open');
  const [fOwner, setFOwner] = useState('all');
  const [search, setSearch] = useState('');

  let filtered = items;
  if (fWS !== 'all') filtered = filtered.filter(i => i.workstream === fWS);
  if (fStatus === 'all_open') filtered = filtered.filter(i => i.status !== 'done');
  else if (fStatus !== 'all') filtered = filtered.filter(i => i.status === fStatus);
  if (fOwner !== 'all') filtered = filtered.filter(i => i.owner === fOwner);
  if (search) filtered = filtered.filter(i => i.title.toLowerCase().includes(search.toLowerCase()) || (i.notes || '').toLowerCase().includes(search.toLowerCase()));

  return (
    <div>
      <FilterBar
        search={search} setSearch={setSearch}
        fWS={fWS} setFWS={setFWS}
        fStatus={fStatus} setFStatus={setFStatus}
        fOwner={fOwner} setFOwner={setFOwner}
      />
      <ItemsTable items={filtered} allItems={items} onItemClick={onItemClick} onAddSubtask={onAddSubtask} updateItem={updateItem} />
      <div style={{ padding: '12px 4px', fontSize: 11, color: 'var(--text-3)' }}>
        Showing {filtered.length} of {items.length} items • Sorted by risk, then deadline
      </div>
    </div>
  );
}

function FilterBar({ search, setSearch, fWS, setFWS, fStatus, setFStatus, fOwner, setFOwner }) {
  return (
    <div style={{ display: 'flex', gap: 8, marginBottom: 12, alignItems: 'center', flexWrap: 'wrap' }}>
      <div style={{ display: 'flex', alignItems: 'center', background: '#fff', border: '1px solid var(--border)', borderRadius: 7, width: 240 }}>
        <Icon name="Search" size={13} color="var(--text-3)" style={{ marginLeft: 10 }} />
        <input
          type="text" placeholder="Search title or notes..." value={search} onChange={(e) => setSearch(e.target.value)}
          style={{ border: 'none', padding: '7px 10px', fontSize: 12, flex: 1, background: 'transparent', color: 'var(--text)' }}
        />
      </div>
      <FilterDropdown label="Workstream" value={fWS} onChange={setFWS}
        options={[{ id: 'all', label: 'All' }, ...WORKSTREAMS.map(w => ({ id: w.id, label: w.label, color: w.color }))]}
      />
      <FilterDropdown label="Status" value={fStatus} onChange={setFStatus}
        options={[{ id: 'all_open', label: 'All open' }, { id: 'all', label: 'All (incl. done)' }, ...STATUSES.map(s => ({ id: s.id, label: s.label, color: s.color }))]}
      />
      <FilterDropdown label="Owner" value={fOwner} onChange={setFOwner}
        options={[{ id: 'all', label: 'All' }, ...PEOPLE.map(p => ({ id: p.id, label: p.name }))]}
      />
    </div>
  );
}

function FilterDropdown({ label, value, options, onChange }) {
  const [open, setOpen] = useState(false);
  const ref = useRef(null);
  const selected = options.find(o => o.id === value);

  useEffect(() => {
    const h = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', h);
    return () => document.removeEventListener('mousedown', h);
  }, []);

  return (
    <div style={{ position: 'relative' }} ref={ref}>
      <button
        onClick={() => setOpen(!open)}
        className="btn btn-secondary"
        style={{ fontSize: 12 }}
      >
        <span style={{ color: 'var(--text-3)' }}>{label}:</span>
        <span style={{ fontWeight: 500 }}>{selected?.label}</span>
        <Icon name="ChevronDown" size={11} color="var(--text-2)" />
      </button>
      {open && (
        <div style={{ position: 'absolute', top: 'calc(100% + 4px)', left: 0, minWidth: 180, background: '#fff', border: '1px solid var(--border)', borderRadius: 8, boxShadow: '0 8px 24px rgba(0,0,0,0.08)', padding: 4, zIndex: 20 }}>
          {options.map(opt => (
            <button
              key={opt.id}
              onClick={() => { onChange(opt.id); setOpen(false); }}
              style={{ display: 'flex', alignItems: 'center', gap: 8, width: '100%', padding: '7px 10px', borderRadius: 5, fontSize: 12, textAlign: 'left', background: opt.id === value ? '#f1f5f9' : 'transparent' }}
              className="row-hover"
            >
              {opt.color && <span className="dot" style={{ backgroundColor: opt.color }} />}
              <span>{opt.label}</span>
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

// WORKSTREAM PAGE
// ============================================================

function WorkstreamPage({ workstreamId, items, events, onItemClick, onAddSubtask, updateItem }) {
  const ws = get(workstreamId, WORKSTREAMS);
  if (!ws) return <div>Workstream not found</div>;

  const wsItems = items.filter(i => i.workstream === workstreamId);
  const open = wsItems.filter(i => i.status !== 'done');
  const atRisk = open.filter(i => { const r = riskLevel(i); return r === 'overdue' || r === 'critical' || r === 'blocked'; });
  const wsEvents = events.filter(e => wsItems.find(i => i.id === e.item_id)).slice(0, 5);

  // Aggregate connected resources across items
  const allLinks = [];
  wsItems.forEach(i => (i.links || []).forEach(l => allLinks.push({ ...l, itemId: i.id, itemTitle: i.title })));

  return (
    <div>
      {/* WS Header card */}
      <div className="card" style={{ padding: 16, marginBottom: 14, borderLeft: `3px solid ${ws.color}` }}>
        <div style={{ display: 'flex', gap: 24, alignItems: 'flex-start' }}>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 12, color: 'var(--text-2)', lineHeight: 1.55 }}>{ws.description}</div>
          </div>
          <div style={{ display: 'flex', gap: 20 }}>
            <MiniStat label="Open" value={open.length} />
            <MiniStat label="At risk" value={atRisk.length} tone="danger" />
            <MiniStat label="In progress" value={open.filter(i => i.status === 'in_progress').length} tone="info" />
            <MiniStat label="Done" value={wsItems.length - open.length} tone="success" />
          </div>
        </div>
      </div>

      {/* Items + Connected data side by side */}
      <div style={{ display: 'grid', gridTemplateColumns: '2fr 1fr', gap: 14, marginBottom: 14 }}>
        <div>
          <SectionHeader title="Items" count={wsItems.length} />
          <ItemsTable items={wsItems} allItems={items} onItemClick={onItemClick} onAddSubtask={onAddSubtask} updateItem={updateItem} showWorkstreamCol={false} />
        </div>
        <div>
          <SectionHeader title="Connected resources" count={allLinks.length} />
          <ConnectedResources links={allLinks} items={items} onItemClick={onItemClick} />
        </div>
      </div>

      {/* Recent activity for this workstream */}
      <SectionHeader title="Recent activity in this workstream" count={wsEvents.length} />
      <ActivityPanel events={wsEvents} items={items} onItemClick={onItemClick} />
    </div>
  );
}

function MiniStat({ label, value, tone = 'neutral' }) {
  const colors = { neutral: 'var(--text)', danger: 'var(--danger)', info: 'var(--info)', success: 'var(--ok)' };
  return (
    <div>
      <div style={{ fontSize: 10, color: 'var(--text-3)', fontWeight: 500, textTransform: 'uppercase', letterSpacing: 0.4 }}>{label}</div>
      <div style={{ fontSize: 22, fontWeight: 600, color: colors[tone], letterSpacing: -0.5 }}>{value}</div>
    </div>
  );
}

function SectionHeader({ title, count }) {
  return (
    <div style={{ display: 'flex', alignItems: 'baseline', gap: 8, marginBottom: 8, padding: '0 4px' }}>
      <div style={{ fontSize: 12, fontWeight: 600 }}>{title}</div>
      {count !== undefined && <div style={{ fontSize: 11, color: 'var(--text-3)' }} className="mono">{count}</div>}
    </div>
  );
}

function ConnectedResources({ links, items, onItemClick }) {
  if (links.length === 0) {
    return <div className="card" style={{ padding: 20, textAlign: 'center', color: 'var(--text-3)', fontSize: 12 }}>No connected resources yet.</div>;
  }
  const byType = {};
  links.forEach(l => { if (!byType[l.type]) byType[l.type] = []; byType[l.type].push(l); });

  return (
    <div className="card" style={{ padding: 10 }}>
      {Object.entries(byType).map(([type, ls]) => {
        const meta = LINK_TYPES[type] || LINK_TYPES.external;
        return (
          <div key={type} style={{ marginBottom: 10 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 6, padding: '4px 6px', fontSize: 10, fontWeight: 600, color: 'var(--text-3)', textTransform: 'uppercase', letterSpacing: 0.5 }}>
              <Icon name={meta.icon} size={11} color={meta.color} />
              <span>{meta.label}</span>
              <span className="mono" style={{ marginLeft: 'auto' }}>{ls.length}</span>
            </div>
            {ls.map((l, idx) => {
              const item = items.find(i => i.id === l.itemId);
              return (
                <div
                  key={idx}
                  className="row-hover"
                  onClick={() => item && onItemClick(item)}
                  style={{ padding: '6px 8px', borderRadius: 5, cursor: 'pointer', display: 'flex', flexDirection: 'column', gap: 2 }}
                >
                  <div style={{ fontSize: 12, fontWeight: 500, display: 'flex', alignItems: 'center', gap: 6 }}>
                    <span style={{ overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{l.label}</span>
                    <Icon name="ExternalLink" size={10} color="var(--text-3)" />
                  </div>
                  {l.itemTitle && <div style={{ fontSize: 10, color: 'var(--text-3)', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>↳ {l.itemTitle}</div>}
                </div>
              );
            })}
          </div>
        );
      })}
    </div>
  );
}

        <div style={{ display: 'flex', alignItems: 'flex-start', gap: 10 }}>

function IntakePanel({ items, onAddItems }) {
  const [mode, setMode] = useState('prompt'); // prompt | upload
  const [context, setContext] = useState('');
  const [instructions, setInstructions] = useState('');
  const [uploadedFile, setUploadedFile] = useState(null);
  const [loading, setLoading] = useState(false);
  const [proposals, setProposals] = useState(null);
  const [selectedProposals, setSelectedProposals] = useState(new Set());
  const [error, setError] = useState('');

  const handleFile = async (file) => {
    if (!file) return;
    setUploadedFile({ name: file.name, size: file.size });
    const reader = new FileReader();
    reader.onload = (e) => {
      const text = e.target.result;
      const maxChars = 15000;
      const truncated = text.length > maxChars ? text.slice(0, maxChars) + '\n\n[...truncated]' : text;
      setContext(truncated);
    };
    if (file.type.startsWith('image/') || !file.type.match(/text|csv|json|xml|html/)) {
      setError('Text-based files only (CSV, TXT, MD, JSON, etc.). For spreadsheets, please export to CSV first or paste content directly.');
      setUploadedFile(null);
      return;
    }
    reader.readAsText(file);
    setError('');
  };

  const generate = async () => {
    const apiKey = localStorage.getItem(STORAGE_KEY_API) || '';
    if (!apiKey) {
      setError('Add an API key in Settings to use this feature.');
      return;
    }
    if (!instructions.trim()) {
      setError('Please describe what tasks you want to create.');
      return;
    }
    setError('');
    setLoading(true);
    setProposals(null);

    try {
      const systemPrompt = `You generate operational tasks for BlueDot Impact's Ops Operations Center based on user-provided context and instructions.

Available workstreams: ${WORKSTREAMS.map(w => `"${w.id}" (${w.label})`).join(', ')}
Available owners: ${PEOPLE.map(p => `"${p.id}" (${p.name})`).join(', ')}
Available priorities: "p0" (urgent), "p1" (high), "p2" (medium), "p3" (low)
Available statuses: "not_started", "in_progress", "blocked", "done"
Available resource types: ${RESOURCE_TYPES.map(r => `"${r.id}" (${r.label})`).join(', ')}
Available timeframes: ${TIMEFRAMES.map(t => `"${t.id}" (${t.label})`).join(', ')}

Today's date: ${new Date().toISOString().slice(0, 10)}

Return ONLY a valid JSON object with this exact structure, no prose, no markdown:
{
  "tasks": [
    {
      "title": "Short imperative task title",
      "workstream": "workstream_id",
      "owner": "person_id",
      "priority": "p0|p1|p2|p3",
      "status": "not_started",
      "deadline": "YYYY-MM-DD",
      "resource": "resource_id",
      "timeframe": "timeframe_id",
      "notes": "1-3 sentences of context explaining what needs to happen"
    }
  ]
}

Rules:
- Generate 1-8 tasks maximum. Be precise, not exhaustive.
- Only use IDs from the lists above. No made-up values.
- Default owner to "head_ops" unless the context clearly indicates someone else.
- Default status to "not_started".
- Set realistic deadlines based on urgency implied by the context.
- Tasks should be specific and actionable, not vague.`;

      const userMsg = `Context${context ? ':' : ' (none provided)'}
${context || ''}

Instructions: ${instructions}`;

      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true',
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 2000,
          system: systemPrompt,
          messages: [{ role: 'user', content: userMsg }],
        }),
      });

      const data = await res.json();
      if (data.error) {
        setError(`API error: ${data.error.message || 'unknown'}`);
        return;
      }

      const text = data.content?.filter(b => b.type === 'text').map(b => b.text).join('\n') || '';
      let jsonMatch = text.match(/\{[\s\S]*\}/);
      if (!jsonMatch) {
        setError('Could not parse response. Try again with clearer instructions.');
        return;
      }

      const parsed = JSON.parse(jsonMatch[0]);
      if (!parsed.tasks || !Array.isArray(parsed.tasks)) {
        setError('Response did not contain a tasks array.');
        return;
      }

      setProposals(parsed.tasks);
      setSelectedProposals(new Set(parsed.tasks.map((_, i) => i)));
    } catch (e) {
      setError(`Error: ${e.message}`);
    } finally {
      setLoading(false);
    }
  };

  const commitProposals = () => {
    if (!proposals) return;
    const selected = proposals.filter((_, i) => selectedProposals.has(i));
    onAddItems(selected);
    setProposals(null);
    setSelectedProposals(new Set());
    setContext('');
    setInstructions('');
    setUploadedFile(null);
  };

  const updateProposal = (idx, updates) => {
    setProposals(prev => prev.map((p, i) => i === idx ? { ...p, ...updates } : p));
  };

  const toggleProposal = (idx) => {
    const next = new Set(selectedProposals);
    if (next.has(idx)) next.delete(idx); else next.add(idx);
    setSelectedProposals(next);
  };

  return (
    <div>
      <SectionHeader title="Intake" />
      <div className="card" style={{ padding: 16 }}>
        <div style={{ fontSize: 12, color: 'var(--text-2)', marginBottom: 14, lineHeight: 1.55 }}>
          Upload a document or paste context, describe what needs to happen, and the intake will propose structured tasks you can review and commit to the tracker.
        </div>

        {/* Mode toggle */}
        <div style={{ display: 'flex', gap: 4, padding: 3, background: '#f1f5f9', borderRadius: 7, marginBottom: 12 }}>
          <button
            onClick={() => setMode('prompt')}
            style={{ flex: 1, padding: '6px 10px', borderRadius: 5, fontSize: 12, fontWeight: 500, background: mode === 'prompt' ? '#fff' : 'transparent', color: mode === 'prompt' ? 'var(--text)' : 'var(--text-2)', boxShadow: mode === 'prompt' ? '0 1px 2px rgba(0,0,0,0.05)' : 'none' }}
          >
            Prompt only
          </button>
          <button
            onClick={() => setMode('upload')}
            style={{ flex: 1, padding: '6px 10px', borderRadius: 5, fontSize: 12, fontWeight: 500, background: mode === 'upload' ? '#fff' : 'transparent', color: mode === 'upload' ? 'var(--text)' : 'var(--text-2)', boxShadow: mode === 'upload' ? '0 1px 2px rgba(0,0,0,0.05)' : 'none' }}
          >
            Upload document
          </button>
        </div>

        {mode === 'upload' && (
          <div style={{ marginBottom: 12 }}>
            <div className="section-label" style={{ marginBottom: 6 }}>Upload file (CSV, TXT, MD, JSON)</div>
            <label style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 20, border: '2px dashed var(--border-strong)', borderRadius: 8, background: uploadedFile ? '#ecfdf5' : '#f8fafc', cursor: 'pointer', gap: 10 }}>
              <Icon name={uploadedFile ? 'FileCheck' : 'Upload'} size={16} color={uploadedFile ? '#10b981' : 'var(--text-2)'} />
              <div style={{ fontSize: 12, color: 'var(--text-2)' }}>
                {uploadedFile ? (
                  <><strong style={{ color: '#065f46' }}>{uploadedFile.name}</strong> <span style={{ color: 'var(--text-3)' }}>({(uploadedFile.size / 1024).toFixed(1)} KB)</span></>
                ) : 'Click or drop a file here'}
              </div>
              <input type="file" accept=".csv,.txt,.md,.json,.xml,.html,.tsv,text/*" onChange={(e) => handleFile(e.target.files[0])} style={{ display: 'none' }} />
            </label>
          </div>
        )}

        <div style={{ marginBottom: 12 }}>
          <div className="section-label" style={{ marginBottom: 6 }}>Context (optional)</div>
          <textarea
            placeholder={mode === 'upload' ? 'File contents will appear here after upload. You can also paste additional context.' : 'Paste any relevant context: email thread, document text, notes, meeting summary, etc.'}
            value={context}
            onChange={(e) => setContext(e.target.value)}
            className="input"
            style={{ minHeight: 80, resize: 'vertical', fontFamily: 'ui-monospace, monospace', fontSize: 11.5 }}
          />
          {context.length > 0 && (
            <div style={{ fontSize: 10, color: 'var(--text-3)', marginTop: 4 }}>{context.length.toLocaleString()} characters</div>
          )}
        </div>

        <div style={{ marginBottom: 12 }}>
          <div className="section-label" style={{ marginBottom: 6 }}>Instructions *</div>
          <textarea
            placeholder="e.g. Create tasks for collecting salary info for the 3 new hires, each with a 1-week deadline."
            value={instructions}
            onChange={(e) => setInstructions(e.target.value)}
            className="input"
            style={{ minHeight: 60, resize: 'vertical' }}
          />
        </div>

        {error && (
          <div style={{ padding: 10, background: '#fef2f2', border: '1px solid #fecaca', borderRadius: 6, fontSize: 11.5, color: '#991b1b', marginBottom: 10 }}>
            {error}
          </div>
        )}

        <button
          className="btn btn-primary"
          onClick={generate}
          disabled={loading || !instructions.trim()}
          style={{ width: '100%', justifyContent: 'center', padding: '9px 14px', opacity: loading || !instructions.trim() ? 0.5 : 1 }}
        >
          {loading ? (
            <>
              <span style={{ width: 10, height: 10, border: '1.5px solid rgba(255,255,255,0.3)', borderTopColor: '#fff', borderRadius: '50%', animation: 'spin 0.6s linear infinite' }} />
              <span>Generating...</span>
            </>
          ) : (
            <>
              <Icon name="Sparkles" size={12} color="#fff" />
              <span>Generate tasks</span>
            </>
          )}
        </button>
      </div>

      {proposals && (
        <ProposalsReview
          proposals={proposals}
          selected={selectedProposals}
          onToggle={toggleProposal}
          onUpdate={updateProposal}
          onCommit={commitProposals}
          onDiscard={() => { setProposals(null); setSelectedProposals(new Set()); }}
        />
      )}
    </div>
  );
}

function ProposalsReview({ proposals, selected, onToggle, onUpdate, onCommit, onDiscard }) {
  return (
    <div className="card" style={{ padding: 16, marginTop: 12 }}>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 10 }}>

          <div style={{ fontSize: 13, fontWeight: 600 }}>Proposed tasks</div>
          <div style={{ fontSize: 11, color: 'var(--text-3)' }}>{selected.size} of {proposals.length} selected. Review and commit.</div>
        </div>
        <div style={{ display: 'flex', gap: 6 }}>
          <button className="btn btn-secondary" onClick={onDiscard}>Discard</button>
          <button className="btn btn-primary" onClick={onCommit} disabled={selected.size === 0} style={{ opacity: selected.size === 0 ? 0.4 : 1 }}>
            <Icon name="Check" size={12} color="#fff" />
            <span>Commit {selected.size} to tracker</span>
          </button>
        </div>
      </div>

      <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
        {proposals.map((p, idx) => {
          const ws = get(p.workstream, WORKSTREAMS);
          const owner = get(p.owner, PEOPLE);
          const priority = get(p.priority, PRIORITIES);
          const isSelected = selected.has(idx);
          return (
            <div
              key={idx}
              style={{ padding: 12, borderRadius: 7, border: `1.5px solid ${isSelected ? '#6366f1' : 'var(--border)'}`, background: isSelected ? '#eef2ff' : '#fff', display: 'flex', gap: 12 }}
            >
              <button onClick={() => onToggle(idx)} style={{ padding: 2, alignSelf: 'flex-start', marginTop: 2 }}>
                {isSelected ? <Icon name="CheckSquare" size={16} color="#6366f1" /> : <Icon name="Square" size={16} color="#cbd5e1" />}
              </button>
              <div style={{ flex: 1, display: 'flex', flexDirection: 'column', gap: 8 }}>

                  value={p.title}

                  <div style={{ fontSize: 11.5, color: 'var(--text-2)', lineHeight: 1.5 }}>{p.notes}</div>
                )}
                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 6 }}>
                  <select value={p.workstream} onChange={(e) => onUpdate(idx, { workstream: e.target.value })} style={{ padding: '4px 6px', fontSize: 11, border: '1px solid var(--border)', borderRadius: 4, background: '#fff' }}>
                    {WORKSTREAMS.map(w => <option key={w.id} value={w.id}>{w.label}</option>)}
                  </select>
                  <select value={p.owner} onChange={(e) => onUpdate(idx, { owner: e.target.value })} style={{ padding: '4px 6px', fontSize: 11, border: '1px solid var(--border)', borderRadius: 4, background: '#fff' }}>
                    {PEOPLE.map(p2 => <option key={p2.id} value={p2.id}>{p2.name}</option>)}
                  </select>
                  <select value={p.priority} onChange={(e) => onUpdate(idx, { priority: e.target.value })} style={{ padding: '4px 6px', fontSize: 11, border: '1px solid var(--border)', borderRadius: 4, background: '#fff' }}>
                    {PRIORITIES.map(pr => <option key={pr.id} value={pr.id}>{pr.label}</option>)}
                  </select>
                  <input
                    type="date"
                    value={p.deadline}
                    onChange={(e) => onUpdate(idx, { deadline: e.target.value })}
                    style={{ padding: '4px 6px', fontSize: 11, border: '1px solid var(--border)', borderRadius: 4, background: '#fff' }}
                  />
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

                       child.status === 'blocked' ? <Icon name="AlertCircle" size={13} color="#dc2626" /> :

                      <span className="mono" style={{ fontSize: 10, color: riskColors[crisk], fontWeight: 600, minWidth: 40, textAlign: 'right' }}>{child.status === 'done' ? '—' : formatDeadline(child.deadline)}</span>

          {/* Activity */}
          {itemEvents.length > 0 && (
            <div style={{ padding: '0 24px 20px' }}>
              <div className="section-label" style={{ marginBottom: 8 }}>Activity</div>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
                {itemEvents.map(e => (
                  <div key={e.id} style={{ display: 'flex', gap: 8, fontSize: 11, color: 'var(--text-2)', padding: '4px 0' }}>
                    <span style={{ fontWeight: 500, color: 'var(--text)' }}>{get(e.actor, PEOPLE)?.name || e.actor}</span>
                    <span>{e.event_type === 'created' ? 'created this item' : `${e.event_type.replace('_', ' ')}: ${e.from || '—'} → ${e.to || '—'}`}</span>
                    <span className="mono" style={{ marginLeft: 'auto', color: 'var(--text-3)' }}>{new Date(e.timestamp).toLocaleDateString()}</span>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>

        {/* Footer */}
        <div style={{ padding: '12px 20px', borderTop: '1px solid var(--border)', display: 'flex', justifyContent: 'space-between' }}>
          <button className="btn btn-danger" onClick={() => { if (window.confirm('Delete this item and its sub-tasks?')) onDelete(); }}>
            <Icon name="Trash2" size={12} />
            <span>Delete</span>
          </button>
          <div className="mono" style={{ fontSize: 10, color: 'var(--text-3)', alignSelf: 'center' }}>{item.id}</div>
        </div>
      </div>
    </div>
  );
}

        <span>{label}</span>
      </div>
      {children}
    </div>

function CriticalityEditor({ item, score, breakdown, onUpdate }) {
  const [editing, setEditing] = useState(false);
  const [value, setValue] = useState(score);
  const hasOverride = typeof item.criticality_override === 'number';

  useEffect(() => { setValue(score); }, [score]);

  const commit = () => {
    const v = Math.max(1, Math.min(10, Math.round(Number(value) || 1)));
    onUpdate({ criticality_override: v });
    setEditing(false);
  };

  const clearOverride = () => {
    onUpdate({ criticality_override: null });
    setEditing(false);
  };

  if (editing) {
    return (
      <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
        <input
          type="number"
          min="1" max="10"
          value={value}
          onChange={(e) => setValue(e.target.value)}
          onKeyDown={(e) => { if (e.key === 'Enter') commit(); if (e.key === 'Escape') setEditing(false); }}
          autoFocus
          style={{ width: 50, padding: '4px 6px', fontSize: 13, fontWeight: 600, border: '1.5px solid #6366f1', borderRadius: 5, textAlign: 'center' }}
          className="mono"
        />
        <button className="btn btn-primary" style={{ padding: '4px 8px', fontSize: 11 }} onClick={commit}>Set</button>
        {hasOverride && <button className="btn btn-secondary" style={{ padding: '4px 8px', fontSize: 11 }} onClick={clearOverride}>Clear</button>}
        <button className="btn btn-secondary" style={{ padding: '4px 8px', fontSize: 11 }} onClick={() => setEditing(false)}>Cancel</button>
      </div>
    );
  }

  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '4px 0', cursor: 'pointer' }} onClick={() => setEditing(true)} title="Click to override">
      <ScoreBadge score={score} />
      <div style={{ fontSize: 10, color: 'var(--text-3)', flex: 1 }}>
        {hasOverride ? (
          <span style={{ color: '#6366f1', fontWeight: 500 }}>Manual override · click to edit</span>
        ) : (
          breakdown.parts.map(p => `${p.label} +${p.value}`).join(' · ')
        )}
      </div>
      <Icon name="Pencil" size={11} color="var(--text-3)" />
    </div>
  );
}

function AddItemModal({ parentId, allItems, onClose, onAdd }) {
  const parent = parentId ? allItems.find(i => i.id === parentId) : null;
  const [form, setForm] = useState({
    title: '',
    workstream: parent?.workstream || 'people',
    parent_id: parentId || null,
    owner: parent?.owner || 'head_ops',
    vendor: '',
    deadline: daysFromNow(14),
    status: 'not_started',
    priority: 'p2',
    resource: 'time',
    timeframe: '1w',
    notes: '',
    links: [],
    tags: [],
  });

  const canSubmit = form.title.trim().length > 0;

  return (
    <div className="modal-overlay" onClick={onClose} style={{ position: 'fixed', inset: 0, background: 'rgba(15,23,42,0.4)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 100, padding: 20 }}>
      <div onClick={(e) => e.stopPropagation()} style={{ background: '#fff', borderRadius: 12, width: '100%', maxWidth: 620, maxHeight: '90vh', display: 'flex', flexDirection: 'column', boxShadow: '0 20px 60px rgba(0,0,0,0.2)' }}>
        <div style={{ padding: '14px 20px', borderBottom: '1px solid var(--border)', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
          <div style={{ fontSize: 14, fontWeight: 600 }}>{parent ? `New sub-task under "${parent.title}"` : 'New item'}</div>
          <button onClick={onClose} className="icon-btn"><Icon name="X" size={15} /></button>
        </div>

        <div style={{ padding: 20, overflow: 'auto' }}>
          <input
            type="text" placeholder="What needs to get done?" value={form.title}
            onChange={(e) => setForm({ ...form, title: e.target.value })}
            style={{ width: '100%', fontSize: 17, fontWeight: 600, border: 'none', padding: '3px 0', marginBottom: 18, background: 'transparent' }}
            autoFocus
          />

          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 12, marginBottom: 16 }}>
            <DetailField icon="Layers" label="Workstream">
              <select value={form.workstream} onChange={(e) => setForm({ ...form, workstream: e.target.value })} className="input">
                {WORKSTREAMS.map(w => <option key={w.id} value={w.id}>{w.label}</option>)}
              </select>
            </DetailField>
            <DetailField icon="User" label="Owner">
              <select value={form.owner} onChange={(e) => setForm({ ...form, owner: e.target.value })} className="input">
                {PEOPLE.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
              </select>
            </DetailField>
            <DetailField icon="Flag" label="Priority">
              <select value={form.priority} onChange={(e) => setForm({ ...form, priority: e.target.value })} className="input">
                {PRIORITIES.map(p => <option key={p.id} value={p.id}>{p.label}</option>)}
              </select>
            </DetailField>
            <DetailField icon="Calendar" label="Deadline">
              <input type="date" value={form.deadline} onChange={(e) => setForm({ ...form, deadline: e.target.value })} className="input" />
            </DetailField>
            <DetailField icon="Wrench" label="Resource needed">
              <select value={form.resource} onChange={(e) => setForm({ ...form, resource: e.target.value })} className="input">
                {RESOURCE_TYPES.map(r => <option key={r.id} value={r.id}>{r.label}</option>)}
              </select>
            </DetailField>
            <DetailField icon="Hourglass" label="Effort estimate">
              <select value={form.timeframe} onChange={(e) => setForm({ ...form, timeframe: e.target.value })} className="input">
                {TIMEFRAMES.map(t => <option key={t.id} value={t.id}>{t.label}</option>)}
              </select>
            </DetailField>
          </div>

          <DetailField icon="FileText" label="Notes">
            <textarea value={form.notes} onChange={(e) => setForm({ ...form, notes: e.target.value })} className="input" style={{ minHeight: 70, resize: 'vertical' }} placeholder="Context, links, next steps..." />
          </DetailField>
        </div>

        <div style={{ padding: '12px 20px', borderTop: '1px solid var(--border)', display: 'flex', justifyContent: 'flex-end', gap: 8 }}>
          <button className="btn btn-secondary" onClick={onClose}>Cancel</button>
          <button className="btn btn-primary" disabled={!canSubmit} style={{ opacity: canSubmit ? 1 : 0.4, cursor: canSubmit ? 'pointer' : 'not-allowed' }} onClick={() => canSubmit && onAdd(form)}>
            Create {parent ? 'sub-task' : 'item'}
          </button>
        </div>
      </div>
    </div>
  );
}

function APIKeySettings() {
  const [apiKey, setApiKey] = useState(() => localStorage.getItem(STORAGE_KEY_API) || '');
  const [saved, setSaved] = useState(false);

  const save = () => {
    localStorage.setItem(STORAGE_KEY_API, apiKey);
    setSaved(true);
    setTimeout(() => setSaved(false), 2000);
  };

  return (
    <div style={{ padding: 20 }}>
      <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 6 }}>API key</div>
      <div style={{ fontSize: 12, color: 'var(--text-2)', marginBottom: 12, lineHeight: 1.6 }}>

      <input type="password" value={apiKey} onChange={(e) => setApiKey(e.target.value)} placeholder="Paste API key..." className="input mono" style={{ fontSize: 12 }} />
      <div style={{ display: 'flex', gap: 8, marginTop: 12 }}>
        <button className="btn btn-primary" onClick={save}>{saved ? 'Saved' : 'Save'}</button>

        <strong>Demo note:</strong> In production, API calls would route through a backend service so keys are never exposed client-side. See the deployment documentation for secure setup.

    </div>
